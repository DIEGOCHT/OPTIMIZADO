<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Broadcast Test</title>
</head>
<body>

<script>

const canal = new BroadcastChannel("LOTES");

const params = new URLSearchParams(location.search);
const nombre = params.get("id") || "SIN_ID";

console.log(nombre + " iniciado");

canal.onmessage = function(e){

    console.log(
        nombre,
        "RECIBIÓ:",
        e.data
    );

};

window.enviarMensaje = function(){

    canal.postMessage({

        origen:nombre,

        hora:new Date().toLocaleTimeString()

    });

    console.log(
        nombre,
        "ENVÍO MENSAJE"
    );

};

</script>

</body>
</html>
