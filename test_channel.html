<script>

const canal = new BroadcastChannel("LOTES");

const params = new URLSearchParams(location.search);
const nombre = params.get("id");

console.log(nombre + " iniciado");

canal.onmessage = function(e){

    console.log(nombre + " recibió:", e.data);

};

setTimeout(()=>{

    canal.postMessage(nombre + " dice HOLA");

    console.log(nombre + " envió");

},3000);

</script>
